events { }

error_log /var/log/nginx/error.log debug;

http {
    include mime.types;  # Standard MIME-Typen hinzufügen
    gzip on;
    gzip_http_version 1.1;
    gzip_disable      "MSIE [1-6]\.";
    gzip_min_length   256;
    gzip_vary         on;
    gzip_proxied      expired no-cache no-store private auth;
    gzip_types        text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_comp_level   9;

    server {
        listen 80;

        root /usr/share/nginx/html;

        # Konfiguration für dbmanager_fronted
        location /dbmanager_fronted/ {
            try_files $uri $uri/ /dbmanager_fronted/browser/index.html;
        }

        # Konfiguration für frontend
        location /frontend/ {
            try_files $uri $uri/ /frontend/browser/index.html;
        }

        # Konfiguration für game-frontend
        location /game/ {
            try_files $uri $uri/ /game/browser/index.html;
        }

        # Konfiguration für mameie-frontend
        location /mameie/ {
            try_files $uri $uri/ /mameie/browser/index.html;
        }

        # Standard Fehlerseite für Angular SPAs
        error_page 404 /404.html;
        location = /404.html {
            try_files /404.html =404;
        }

        # MIME-Typen manuell ergänzen (optional, falls nötig)
        types {
            text/css css;
            application/javascript js;
            font/woff2 woff2;
        }

        # Cache-Konfiguration für statische Dateien
        location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm|ogv|ogg|mp3|m4a|aac|flac|wav|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
