events { }

http {
    server {
        listen 80;

        # Konfiguration für dbmanager_frontend
        location /dbmanager/ {
            root /usr/share/nginx/html;
            try_files $uri /dbmanager/index.html;
        }

        # Konfiguration für frontend
        location /frontend/ {
            root /usr/share/nginx/html;
            try_files $uri /frontend/index.html;
        }

        # Konfiguration für game-frontend
        location /game/ {
            root /usr/share/nginx/html;
            try_files $uri /game/index.html;
        }

        # Konfiguration für mameie-frontend
        location /mameie/ {
            root /usr/share/nginx/html;
            try_files $uri /mameie/index.html;
        }

        # Fehlerseite
        error_page 404 /404.html;
    }
}
