events { }

error_log /var/log/nginx/error.log debug;

http {
    server {
        listen 80;

        # Konfiguration für dbmanager_frontend
        location /dbmanager/ {
            alias /usr/share/nginx/html/dbmanager_fronted/browser/;
            try_files $uri /index.html;
        }

        # Konfiguration für frontend
        location /frontend/ {
            alias /usr/share/nginx/html/frontend/browser/;
            try_files $uri /index.html;
        }

        # Konfiguration für game-frontend
        location /game/ {
            alias /usr/share/nginx/html/game-frontend/browser/;
            try_files $uri /index.html;
        }

        # Konfiguration für mameie-frontend
        location /mameie/ {
            alias /usr/share/nginx/html/mameie-frontend/browser/;
            try_files $uri /index.html;
        }

        # Fehlerseite
        error_page 404 /404.html;

        # Standard Fehlerseite für SPA
        location = /404.html {
            root /usr/share/nginx/html;
        }
    }
}
