server {
    listen 80;

    root /usr/share/nginx/html;  # Basisverzeichnis für Dateien

    location /browser/dbmanager_fronted/ {
        index index.html;  # Standard-Datei
        try_files $uri $uri/ /browser/dbmanager_fronted/index.html;
    }

    location /browser/ {
        index index.html;
        try_files $uri $uri/ /browser/index.html;
    }

    # Fallback für Angular-SPA-Routen
    location / {
        try_files $uri $uri/ /index.html;
    }
}
