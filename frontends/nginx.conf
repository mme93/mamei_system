events { }

http {
    server {
        listen 80;

        # Konfiguration für dbmanager_frontend
        location /dbmanager/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /dbmanager/index.html;
        }

        # Konfiguration für frontend
        location /frontend/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /frontend/index.html;
        }

        # Konfiguration für game-frontend
        location /game/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /game/index.html;
        }

        # Konfiguration für mameie-frontend
        location /mameie/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /mameie/index.html;
        }

        # Fehlerseite
        error_page 404 /404.html;

        # Standard Fehlerseite für SPA
        location = /404.html {
            root /usr/share/nginx/html;
        }
    }
}
