<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DbmanagerFronted</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
  <script>
    fetch('.')
      .then(response => response.text())
      .then(html => {
        const files = [...html.matchAll(/main-[a-zA-Z0-9]+\.js/g)];
        if (files.length > 0) {
          const script = document.createElement('script');
          script.src = files[0][0];
          document.body.appendChild(script);
        } else {
          console.error('main-***.js Datei wurde nicht gefunden.');
        }
      });
  </script>
</body>
</html>
